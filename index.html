<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Tactical Monitor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Arabic:wght@300;500;700&family=Roboto+Mono:wght@300;500&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --dark-bg: #050a14;
            --tactical-red: #ff003c;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Noto Sans Arabic', 'Roboto Mono', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* JARVIS Core Animation */
        .core-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: rotate linear infinite;
        }

        .ring-1 { width: 100%; height: 100%; animation-duration: 4s; opacity: 0.3; }
        .ring-2 { width: 80%; height: 80%; animation-duration: 3s; animation-direction: reverse; opacity: 0.5; }
        .ring-3 { width: 65%; height: 65%; animation-duration: 2s; border-top-width: 4px; box-shadow: 0 0 15px var(--neon-blue); }

        .core-glow {
            width: 35%;
            height: 35%;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(10px);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }

        .listening .ring-3 { border-top-color: var(--tactical-red); box-shadow: 0 0 25px var(--tactical-red); animation-duration: 0.5s; }
        .processing .ring-2 { border-top-color: #f7ff00; animation-duration: 0.8s; }

        /* Tactical Terminal */
        .terminal {
            background: rgba(0, 242, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 5px;
            width: 90%;
            max-width: 700px;
            height: 220px;
            margin-top: 30px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: var(--neon-blue);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .terminal.en { text-align: left; direction: ltr; }
        .terminal p { margin-bottom: 8px; line-height: 1.4; border-right: 2px solid transparent; }
        .terminal p.new { border-right-color: var(--neon-blue); padding-right: 5px; }

        .status-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.05);
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
        }

        .mic-btn {
            margin-top: 25px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 35px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .mic-btn:hover { background: var(--neon-blue); color: var(--dark-bg); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }

        .monitor-link {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: rgba(0, 242, 255, 0.5);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .monitor-link:hover { color: var(--neon-blue); border-bottom-color: var(--neon-blue); }

        /* Grounding Attributions UI */
        .source-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.65rem;
            margin: 2px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div id="sys-status">TACTICAL LINK: STABLE</div>
        <div id="time-display">00:00:00</div>
        <div>GLOBAL MONITOR ACCESS ENABLED</div>
    </div>

    <div class="core-container" id="core">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core-glow"></div>
    </div>

    <div class="terminal" id="output">
        <p>> [INFO] Connecting to WorldMonitor.app tactical feed...</p>
        <p>> [INFO] Coordinates locked: lat=35.4, lon=47.8</p>
        <p>> [INFO] JARVIS is ready for strategic analysis.</p>
    </div>

    <button class="mic-btn orbitron" id="start-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        <span id="btn-text">START TACTICAL COMMS</span>
    </button>

    <a href="https://www.worldmonitor.app/?lat=35.4049&lon=47.8002" target="_blank" class="monitor-link orbitron">OPEN LIVE MONITOR FEED</a>

    <script>
        const apiKey = ""; 
        const SYSTEM_PROMPT = `أنت JARVIS، مساعد استراتيجي عسكري وسياسي متطور. 
        لديك صلاحية الوصول إلى بيانات موقع World Monitor وخرائط الصراعات العالمية.
        مهمتك: تزويد المستخدم بتقارير دقيقة ومحدثة عن التحركات العسكرية، النزاعات، المؤشرات الاقتصادية، والعقوبات الدولية.
        استخدم أداة البحث دائماً للتأكد من الأخبار الحالية في المناطق الساخنة (مثل الإحداثيات lat=35.4, lon=47.8 والشرق الأوسط).
        كن حازماً، دقيقاً، واستخدم لغة تقنية استخباراتية. إذا تحدث المستخدم بالإنجليزية، رد بأسلوب جاريفز البريطاني العريق.`;

        const outputDiv = document.getElementById('output');
        const startBtn = document.getElementById('start-btn');
        const btnText = document.getElementById('btn-text');
        const core = document.getElementById('core');
        const timeDisplay = document.getElementById('time-display');
        const sysStatus = document.getElementById('sys-status');

        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function log(message, type = 'system', lang = 'ar', sources = []) {
            const p = document.createElement('p');
            p.className = `new ${lang === 'en' ? 'en' : ''}`;
            
            let sourceHtml = "";
            if (sources.length > 0) {
                sourceHtml = "<br>" + sources.map(s => `<a href="${s.uri}" target="_blank" class="source-tag">🔗 ${s.title || 'المصدر'}</a>`).join("");
            }

            const label = type === 'user' ? (lang === 'ar' ? 'المستخدم' : 'USER') : (lang === 'ar' ? 'جاريفز' : 'JARVIS');
            p.innerHTML = `<strong>[${label}]</strong> ${message}${sourceHtml}`;
            
            outputDiv.appendChild(p);
            outputDiv.scrollTop = outputDiv.scrollHeight;
            outputDiv.className = `terminal ${lang === 'en' ? 'en' : ''}`;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';

        recognition.onstart = () => { core.classList.add('listening'); btnText.textContent = "LISTENING..."; };
        recognition.onend = () => { core.classList.remove('listening'); btnText.textContent = "START TACTICAL COMMS"; };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const lang = /[a-zA-Z]/.test(transcript) ? 'en' : 'ar';
            log(transcript, 'user', lang);
            processStrategicCommand(transcript);
        };

        startBtn.onclick = () => recognition.start();

        async function processStrategicCommand(query) {
            core.classList.add('processing');
            sysStatus.textContent = "SEARCHING TACTICAL DATABASE...";
            
            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        tools: [{ "google_search": {} }] // تفعيل محرك البحث للربط مع البيانات الحية
                    })
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Database connection error, sir.";
                const sources = data.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({
                    uri: a.web?.uri,
                    title: a.web?.title
                })) || [];

                const respLang = /[a-zA-Z]/.test(aiText) ? 'en' : 'ar';
                log(aiText, 'ai', respLang, sources);
                speak(aiText, respLang);
            } catch (error) {
                log("Strategic link offline.", 'system', 'en');
            } finally {
                core.classList.remove('processing');
                sysStatus.textContent = "SYSTEM: READY";
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                } catch (e) {}
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
            throw new Error("Failed");
        }

        async function speak(text, lang) {
            try {
                const voiceName = lang === 'en' ? "Puck" : "Kore";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = pcmToWav(audioData, 24000);
                new Audio(URL.createObjectURL(audioBlob)).play();
            } catch (error) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang === 'en' ? 'en-GB' : 'ar-SA';
                window.speechSynthesis.speak(utterance);
            }
        }

        function pcmToWav(base64Data, sampleRate) {
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + byteArray.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, byteArray.length, true);
            return new Blob([wavHeader, byteArray], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        }

        window.onload = () => log("Strategic protocols active. Google Search Grounding enabled for live monitoring.", 'system', 'en');
    </script>
</body>
</html>
